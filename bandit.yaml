# Bandit security scan config
# Skip false positives from config generator templates

skips:
  # B104: 0.0.0.0 in templates is a route default, not interface binding
  - B104
  # B105/B106/B107: Hardcoded passwords in templates are placeholders
  - B105
  - B106
  - B107
  # B311: random in templates is for sample data, not cryptography
  - B311

# Exclude non-source directories
exclude_dirs:
  - tests
  - docs
  - agents
  - scripts

[mypy]
python_version = 3.11
ignore_missing_imports = True
no_implicit_optional = True
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True

# PyInstaller runtime-injected attribute
[mypy-src.utils.resource_path]
disable_error_code = attr-defined

# PyQt5 stubs incomplete
[mypy-src.ui.*]
ignore_missing_imports = True
disable_error_code = attr-defined

# VENDOR_RULES nested dict .get() returns object type
[mypy-src.core.local_audit_engine]
ignore_missing_imports = True
disable_error_code = attr-defined, var-annotated, assignment, arg-type, index, union-attr

# Factory dict type inference limited
[mypy-src.core.config_generator]
disable_error_code = var-annotated, dict-item, no-any-return, call-overload, attr-defined

# Device data dict .get() returns object type
[mypy-src.core.device_manager]
disable_error_code = var-annotated, index, attr-defined
